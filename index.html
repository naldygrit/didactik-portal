<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary Meta Tags -->
    <title>Didactik Media — Securing Africa's Story</title>
    <meta name="description" content="Didactik Media is Africa's leading audiovisual archive infrastructure company. We preserve, catalog, and activate film &amp; broadcast archives with AI-powered tools." />
    <meta name="robots" content="index, follow" />
    <meta name="author" content="Didactik Media" />
    <link rel="canonical" href="https://www.didactikmedia.com/" />

    <!-- Performance: Preconnect to Google Fonts to reduce latency -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Open Graph (Facebook, LinkedIn) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.didactikmedia.com/" />
    <meta property="og:title" content="Didactik Media — Securing Africa's Story" />
    <meta property="og:description" content="Africa's operating system for audiovisual heritage. AI-powered archival infrastructure for broadcasters and cultural institutions." />
    <meta property="og:image" content="https://www.didactikmedia.com/images/og-cover.png" />
    <meta property="og:site_name" content="Didactik Media" />
    <meta property="og:locale" content="en_NG" />

    <!-- Twitter / X Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://www.didactikmedia.com/" />
    <meta name="twitter:title" content="Didactik Media — Securing Africa's Story" />
    <meta name="twitter:description" content="Africa's operating system for audiovisual heritage. AI-powered archival infrastructure for broadcasters and cultural institutions." />
    <meta name="twitter:image" content="https://www.didactikmedia.com/images/og-cover.png" />

    <!-- Structured Data: Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Didactik Media",
      "url": "https://www.didactikmedia.com",
      "logo": "https://www.didactikmedia.com/images/og-cover.png",
      "description": "Africa's operating system for audiovisual heritage — preserving, cataloging, and activating film and broadcast archives with AI-powered infrastructure.",
      "foundingDate": "2022",
      "founder": {
        "@type": "Person",
        "name": "Emem Attah",
        "jobTitle": "Founder & CEO"
      },
      "areaServed": "Africa",
      "address": {
        "@type": "PostalAddress",
        "addressLocality": "Lagos",
        "addressCountry": "NG"
      },
      "contactPoint": {
        "@type": "ContactPoint",
        "email": "emem@didactikmedia.com",
        "contactType": "customer support"
      },
      "sameAs": [
        "https://www.linkedin.com/company/didactik-media/",
        "https://instagram.com/didactikmedia"
      ]
    }
    </script>

    <!-- Structured Data: WebSite -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",

      "url": "https://www.didactikmedia.com",
      "name": "Didactik Media"
    }
    </script>

    <div id="root"></div>
